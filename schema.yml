components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 55
          pattern: ^[-a-zA-Z0-9_]+$
        is_active:
          type: boolean
        level:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        parent:
          type: integer
          nullable: true
      required:
      - id
      - name
      - slug
    PatchedCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 55
          pattern: ^[-a-zA-Z0-9_]+$
        is_active:
          type: boolean
        level:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        parent:
          type: integer
          nullable: true
    PatchedProduct:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 55
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          nullable: true
        is_digital:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
    PatchedStockManagement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_name:
          type: string
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        last_checked_at:
          type: string
          format: date-time
          readOnly: true
        product:
          type: integer
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 55
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          nullable: true
        is_digital:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      required:
      - category
      - created_at
      - id
      - name
      - price
      - slug
      - updated_at
    StockManagement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_name:
          type: string
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        last_checked_at:
          type: string
          format: date-time
          readOnly: true
        product:
          type: integer
      required:
      - id
      - last_checked_at
      - product
      - product_name
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
